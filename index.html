<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Glassmorphism Design</title>
    <style>
        body {
            background: linear-gradient(135deg, rgba(253, 253, 253, 0.1), rgba(240, 240, 240, 0.1));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .glass:hover {
            transform: scale(1.05);
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="glass">
        <h1>Welcome to the Glassmorphism Design!</h1>
        <p>This design features a liquid glass effect with transparency, blur, and a gradient background.</p>
    </div>
</body>
</html>
